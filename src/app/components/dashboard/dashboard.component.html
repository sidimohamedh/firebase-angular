    <div class="row">
        <div class="col-md-4 mt-5">
            <div class="card border-0 shadow p-3" [formGroup]="form">
                <div class="form-floating mb-3 text-center">
                    <h5 class="text-center text-warning">Add Student</h5>
                </div>
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="firstName" formControlName="first_name">
                    <label for="firstName">First Name</label>
                </div>
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="lastName" formControlName="last_name">
                    <label for="lastName">Last Name</label>
                </div>
                <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="email" formControlName="email">
                    <label for="email">Email address</label>
                </div>
                <div class="form-floating mb-3">
                    <input type="number" class="form-control" id="mobile" formControlName="mobile">
                    <label for="mobile">Mobile</label>
                </div>
                <button type="button" class="btn btn-outline-success" (click)="addStudent()">Add Student</button>
            </div>
        </div>
        <div class="col-md-8 mt-2">
            <h5 class="text-danger">Students List</h5>
            <div class="card p-3 shadow">
                <div class="card-body">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th scope="col">First Name</th>
                                <th scope="col">Last Name</th>
                                <th scope="col">Email</th>
                                <th scope="col">Mobile</th>
                                <th scope="col">Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr *ngFor="let student of studentsList">
                                <td>{{student.first_name}}</td>
                                <td>{{student.last_name}}</td>
                                <td>{{student.email}}</td>
                                <td>&#64;{{student.mobile}}</td>
                                <td>
                                    <button type="button" class="btn btn-outline-success m-2" (click)="updateStudent(student)">Update</button>
                                    <button type="button" class="btn btn-outline-danger" (click)="deleteStudent(student)">Delete</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
